<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrivGuard — 登录</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon { font-size: 2.5rem; }
    .logo h1 { font-size: 1.4rem; font-weight: 600; margin-top: 8px; color: #f1f5f9; }
    .logo p { font-size: 0.8rem; color: #64748b; margin-top: 4px; }
    label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: #6366f1; }
    button {
      width: 100%;
      margin-top: 20px;
      padding: 11px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4f46e5; }
    button:disabled { background: #3730a3; cursor: not-allowed; }
    .error {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: #2d1b1b;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      color: #fca5a5;
      font-size: 0.85rem;
    }
    .error.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🛡️</div>
      <h1>PrivGuard</h1>
      <p>隐私保护管理界面</p>
    </div>
    <form id="loginForm">
      <label for="password">访问密码</label>
      <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" autofocus>
      <button type="submit" id="submitBtn">登录</button>
      <div class="error" id="errorMsg">密码错误，请重试</div>
    </form>
  </div>
  <script>
    const form = document.getElementById('loginForm');
    const input = document.getElementById('password');
    const btn = document.getElementById('submitBtn');
    const err = document.getElementById('errorMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.classList.remove('visible');
      btn.disabled = true;
      btn.textContent = '登录中...';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: input.value }),
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          err.classList.add('visible');
          input.value = '';
          input.focus();
        }
      } catch {
        err.textContent = '连接失败，请检查服务是否运行';
        err.classList.add('visible');
      } finally {
        btn.disabled = false;
        btn.textContent = '登录';
      }
    });
  </script>
</body>
</html>
