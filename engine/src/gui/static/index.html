<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrivGuard 管理界面</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="icon">🛡️</div>
      <h2>PrivGuard</h2>
      <p>隐私保护管理界面</p>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-panel="records">
        <span class="nav-icon">📋</span> 拦截记录
      </div>
      <div class="nav-item" data-panel="rules">
        <span class="nav-icon">⚙️</span> 规则管理
      </div>
      <div class="nav-item" data-panel="proxy">
        <span class="nav-icon">🔌</span> 代理状态
      </div>
    </nav>
    <div class="sidebar-footer">
      <button class="btn btn-secondary" style="width:100%" id="logoutBtn">退出登录</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <span class="topbar-title" id="panelTitle">拦截记录</span>
      <div class="topbar-actions">
        <div id="connStatus">
          <span class="status-dot unknown" id="connDot"></span>
          <span id="connText">连接中...</span>
        </div>
      </div>
    </header>

    <div class="content">

      <!-- ── Records Panel ── -->
      <div class="panel active" id="panel-records">
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-label">总拦截次数</div>
            <div class="stat-value" id="statTotal">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">今日拦截</div>
            <div class="stat-value" id="statToday">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">最近活动</div>
            <div class="stat-value" style="font-size:1rem;padding-top:6px" id="statLast">—</div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-title">拦截记录</span>
            <button class="btn btn-secondary btn-sm" id="refreshRecordsBtn">刷新</button>
          </div>

          <!-- Filters -->
          <div class="filters">
            <div class="form-group">
              <label>PII 类型</label>
              <select id="filterType">
                <option value="">全部类型</option>
                <option>PHONE</option><option>EMAIL</option><option>CHINESE_ID</option>
                <option>SSN</option><option>CREDIT_CARD</option><option>API_KEY</option>
                <option>JWT</option><option>PRIVATE_KEY</option><option>IPV4</option>
                <option>BANK_CARD</option>
              </select>
            </div>
            <div class="form-group">
              <label>开始时间</label>
              <input type="datetime-local" id="filterStart">
            </div>
            <div class="form-group">
              <label>结束时间</label>
              <input type="datetime-local" id="filterEnd">
            </div>
            <div class="form-group" style="align-self:flex-end">
              <button class="btn btn-primary btn-sm" id="applyFilterBtn">筛选</button>
              <button class="btn btn-secondary btn-sm" id="clearFilterBtn" style="margin-left:6px">清除</button>
            </div>
          </div>

          <div class="table-wrap">
            <table id="recordsTable">
              <thead>
                <tr>
                  <th>时间</th>
                  <th>方向</th>
                  <th>格式</th>
                  <th>PII 类型</th>
                  <th>数量</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="recordsTbody">
                <tr><td colspan="6" class="text-muted" style="text-align:center;padding:32px">暂无记录</td></tr>
              </tbody>
            </table>
          </div>

          <div class="pagination" id="recordsPagination"></div>
        </div>
      </div>

      <!-- ── Rules Panel ── -->
      <div class="panel" id="panel-rules">
        <div class="card">
          <div class="card-header">
            <span class="card-title">系统规则 <span class="badge badge-gray" id="sysRuleCount">0</span></span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>类型</th><th>名称</th><th>置信度</th><th>验证器</th><th>状态</th></tr>
              </thead>
              <tbody id="sysRulesTbody">
                <tr><td colspan="4" class="text-muted" style="text-align:center;padding:24px">加载中...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-title">自定义规则 <span class="badge badge-purple" id="customRuleCount">0</span></span>
            <button class="btn btn-primary btn-sm" id="addRuleBtn">+ 添加规则</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>类型</th><th>名称</th><th>置信度</th><th>正则模式</th><th>操作</th></tr>
              </thead>
              <tbody id="customRulesTbody">
                <tr><td colspan="5" class="text-muted" style="text-align:center;padding:24px">暂无自定义规则</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Rule Test -->
        <div class="card">
          <div class="card-header"><span class="card-title">规则测试</span></div>
          <div class="form-row">
            <div class="form-group">
              <label>正则模式</label>
              <input type="text" id="testPattern" placeholder="例如: \d{11}">
            </div>
          </div>
          <div class="form-group">
            <label>测试文本</label>
            <textarea id="testText" placeholder="输入要测试的文本..."></textarea>
          </div>
          <button class="btn btn-primary btn-sm" id="testRuleBtn">测试</button>
          <div id="testResult" class="mt-2 hidden">
            <div class="alert alert-info" id="testResultContent"></div>
          </div>
        </div>
      </div>

      <!-- ── Proxy Panel ── -->
      <div class="panel" id="panel-proxy">
        <div class="card">
          <div class="card-header">
            <span class="card-title">代理服务器状态</span>
            <button class="btn btn-secondary btn-sm" id="refreshProxyBtn">刷新</button>
          </div>
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
            <span class="status-dot unknown" id="proxyDot"></span>
            <span id="proxyStatusText" style="font-size:1rem;font-weight:600">检测中...</span>
            <button class="btn btn-primary btn-sm hidden" id="startProxyBtn">启动代理</button>
          </div>
          <table style="width:auto">
            <tbody id="proxyInfoTbody"></tbody>
          </table>
        </div>

        <div class="card">
          <div class="card-header"><span class="card-title">规则变更历史</span></div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>时间</th><th>操作</th><th>规则类型</th><th>规则名称</th></tr></thead>
              <tbody id="changelogTbody">
                <tr><td colspan="4" class="text-muted" style="text-align:center;padding:24px">暂无变更记录</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div><!-- /content -->
  </div><!-- /main -->
</div><!-- /app -->

<!-- Rule Edit Modal -->
<div class="modal-overlay" id="ruleModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="ruleModalTitle">添加自定义规则</span>
      <button class="btn btn-icon" id="closeRuleModal">✕</button>
    </div>
    <div class="form-group">
      <label>类型 (SCREAMING_SNAKE_CASE)</label>
      <input type="text" id="ruleType" placeholder="例如: MY_CUSTOM_ID">
    </div>
    <div class="form-group">
      <label>名称</label>
      <input type="text" id="ruleName" placeholder="例如: 自定义 ID">
    </div>
    <div class="form-group">
      <label>正则模式</label>
      <input type="text" id="rulePattern" placeholder="例如: \d{8}">
      <div class="alert alert-error mt-2 hidden" id="patternError"></div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>置信度</label>
        <select id="ruleConfidence">
          <option value="high">high</option>
          <option value="medium" selected>medium</option>
          <option value="low">low</option>
        </select>
      </div>
      <div class="form-group">
        <label>验证器 (可选)</label>
        <select id="ruleValidator">
          <option value="">无</option>
          <option value="luhn">luhn</option>
          <option value="idcard_checksum">idcard_checksum</option>
          <option value="ssn_format">ssn_format</option>
          <option value="length_11">length_11</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancelRuleBtn">取消</button>
      <button class="btn btn-primary" id="saveRuleBtn">保存</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
