# PrivGuard 自定义规则 / Custom Rules
# 在这里添加你的项目/行业特有的敏感信息规则
# Add your project/industry-specific sensitive information rules here
#
# 格式示例 / Format example:
#   rules:
#     - type: EMPLOYEE_ID       # 类型名（全大写，用于占位符 {{PG:EMPLOYEE_ID_1}}）
#       name: 员工工号           # 可读名称
#       pattern: 'EMP\d{6}'     # 正则表达式
#       confidence: high        # high / medium / low
#       examples:               # 可选：测试用例
#         - input: "工号EMP001234"
#           match: "EMP001234"
#
# 添加规则后，Agent 会在下次运行时自动加载。

rules: []
